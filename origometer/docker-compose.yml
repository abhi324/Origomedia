version: "3.9"

services:
  backend:
    build: ./backend
    container_name: origo_backend
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=redis://redis:6379
      - SERPAPI_KEY=${SERPAPI_KEY}
      - SCRAPING_BEE_KEY=${SCRAPING_BEE_KEY}
      - ENVIRONMENT=production
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: origo_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: origo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: origo_worker
    command: python -m celery -A worker.celery_app worker --loglevel=info --concurrency=4
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=redis://redis:6379
      - SERPAPI_KEY=${SERPAPI_KEY}
      - SCRAPING_BEE_KEY=${SCRAPING_BEE_KEY}
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
